# This file was autogenerated using `zio-sbt-ci` plugin via `sbt ciGenerateGithubWorkflow` 
# task and should be included in the git repository. Please do not edit it manually.

name: CI
env:
  JDK_JAVA_OPTIONS: -XX:+PrintCommandLineFlags -Xms2G -Xmx5G -Xss4M -XX:+UseG1GC
'on':
  workflow_dispatch: {}
  release:
    types:
    - published
  push:
    branches:
    - master
  pull_request:
    branches-ignore:
    - gh-pages
permissions:
  id-token: write
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.run_id || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: '0'
    - name: Install libuv
      run: sudo apt-get update && sudo apt-get install -y libuv1-dev
    - name: Setup build tools
      uses: VirtusLab/scala-cli-setup@main
      with:
        apps: sbt
        jvm: temurin:21
    - name: Cache Dependencies
      uses: coursier/cache-action@v8
    - name: Check all code compiles
      run: sbt buildCodegenBin +Test/compile
    - name: Check artifacts build process
      run: sbt +publishLocal
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: '0'
    - name: Install libuv
      run: sudo apt-get update && sudo apt-get install -y libuv1-dev
    - name: Setup build tools
      uses: VirtusLab/scala-cli-setup@main
      with:
        apps: sbt
        jvm: temurin:21
    - name: Cache Dependencies
      uses: coursier/cache-action@v8
    - name: Check if the site workflow is up to date
      run: sbt ciCheckGithubWorkflow
    - name: Lint
      run: sbt buildCodegenBin lint
  test:
    name: Test
    runs-on: ubuntu-latest
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        java:
        - '21'
    steps:
    - name: Install libcurl
      run: sudo apt-get update && sudo apt-get install -y libidn2-dev libcurl3-dev
    - name: Setup build tools
      uses: VirtusLab/scala-cli-setup@main
      with:
        apps: sbt
        jvm: temurin:21
    - name: Cache Dependencies
      uses: coursier/cache-action@v8
    - name: Git Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: '0'
    - name: Start up pubsub emulator
      run: docker compose up -d && until curl -s http://localhost:8085; do printf 'waiting for pubsub...'; sleep 1; done && echo "pubsub ready"
    - name: Test
      run: sbt buildCodegenBin +test
  ci:
    name: ci
    runs-on: ubuntu-latest
    continue-on-error: false
    needs:
    - lint
    - test
    - build
    steps:
    - name: Report Successful CI
      run: echo "ci passed"
  release:
    name: Release
    runs-on: ubuntu-latest
    continue-on-error: false
    needs:
    - ci
    if: ${{ github.event_name != 'pull_request' }}
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: '0'
    - name: Install libuv
      run: sudo apt-get update && sudo apt-get install -y libuv1-dev
    - name: Setup build tools
      uses: VirtusLab/scala-cli-setup@main
      with:
        apps: sbt
        jvm: temurin:21
    - name: Cache Dependencies
      uses: coursier/cache-action@v8
    - name: Release
      run: |-
        echo "$PGP_SECRET" | base64 -d -i - > /tmp/signing-key.gpg
        echo "$PGP_PASSPHRASE" | gpg --pinentry-mode loopback --passphrase-fd 0 --import /tmp/signing-key.gpg
        (echo "$PGP_PASSPHRASE"; echo; echo) | gpg --command-fd 0 --pinentry-mode loopback --change-passphrase $(gpg --list-secret-keys --with-colons 2> /dev/null | grep '^sec:' | cut --delimiter ':' --fields 5 | tail -n 1)
        sbt 'buildCodegenBin; publishSigned; sonaRelease'
      env:
        PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        PGP_SECRET: ${{ secrets.PGP_SECRET }}
        SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
