name: Update Google API Discovery Specs

on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  update-specs:
    name: Update Google API Discovery Specs
    runs-on: ubuntu-latest
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6

    - name: Update Discovery Documents
      run: |
        update_spec() {
          local name="$1" version="$2"
          local url="https://${name}.googleapis.com/\$discovery/rest?version=${version}"
          local file="codegen/src/main/resources/${name}_${version}.json"
          local tmp
          tmp=$(mktemp)
          if curl -sf "$url" | jq . > "$tmp" && [ -s "$tmp" ]; then
            mv "$tmp" "$file"
            echo "Updated $file"
          else
            echo "Failed to update $file" >&2
            rm -f "$tmp"
            return 1
          fi
        }

        update_spec aiplatform v1
        update_spec bigquery v2
        update_spec iamcredentials v1
        update_spec pubsub v1
        update_spec sheets v4
        update_spec storage v1

    - name: Create Pull Request
      run: |
        BRANCH="sync-discovery-specs-$(date -u +%Y-%m-%d)"
        git config user.name "anymind-bot"
        git config user.email "anymind-bot@users.noreply.github.com"
        if ! git diff --quiet; then
          git checkout -B "$BRANCH"
          git add codegen/src/main/resources/
          git commit -m "Update Google API discovery specs"
          git push origin "$BRANCH" --force
          if ! gh pr view "$BRANCH" --json number -q .number 2>/dev/null; then
            gh pr create \
              --title "Update Google API discovery specs" \
              --body "$(printf 'Automated daily update of Google API discovery documents.\n\nUpdated specs:\n- aiplatform v1\n- bigquery v2\n- iamcredentials v1\n- pubsub v1\n- sheets v4\n- storage v1')" \
              --head "$BRANCH" \
              --base main
          fi
        else
          echo "No changes to commit"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.ANYCHAT_BOT_GITHUB_TOKEN }}
